<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>今晚安排</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1b2735);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{

width:900px;
max-width:95%;

padding:35px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:25px;

box-shadow:0 10px 40px rgba(0,0,0,.35);

animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:none;

}

}

h1{

color:white;

text-align:center;

margin-bottom:30px;

font-size:34px;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:25px;

}

.item{

position:relative;

overflow:hidden;

border-radius:18px;

cursor:pointer;

border:3px solid transparent;

transition:.3s;

}

.item img{

width:100%;

height:240px;

object-fit:cover;

display:block;

transition:.35s;

}

.item:hover img{

transform:scale(1.06);

}

.item input{

position:absolute;

top:12px;

left:12px;

transform:scale(1.5);

}

.item:has(input:checked){

border-color:#00ff95;

box-shadow:0 0 25px #00ff95;

}

button{

display:block;

margin:35px auto 0;

padding:15px 50px;

font-size:22px;

border:none;

border-radius:50px;

background:#00d084;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px #00d084;

}

#page2,
#page3{

display:none;

text-align:center;

}

.radio{

margin:25px;

font-size:28px;

color:white;

}

.radio input{

transform:scale(1.5);

margin-right:12px;

}

.author{

position:fixed;

right:18px;

bottom:15px;

color:rgba(255,255,255,.6);

font-size:15px;

}

.black{

background:black;

}

.black h1{

margin-top:80px;

}

.black p{

margin-top:45px;

font-size:24px;

color:#d0d0d0;

}
</style>

</head>

<body>

<div id="page1" class="card">

<h1>🌙 请选择晚上的活动（可多选）</h1>

<div class="grid">

<label class="item">
<input type="checkbox">
<img src="1.jpg">
</label>

<label class="item">
<input type="checkbox">
<img src="2.jpg">
</label>

<label class="item">
<input type="checkbox">
<img src="3.jpg">
</label>

<label class="item">
<input type="checkbox">
<img src="4.jpg">
</label>

</div>

<button onclick="nextPage()">确认</button>

</div>

<div id="page2" class="card">

<h1>😂 不来是孙子</h1>

<div class="radio">

<label>

<input type="radio" name="choose">

我是孙子

</label>

</div>

<div class="radio">

<label>

<input type="radio" name="choose">

我肯定来

</label>

</div>

<button onclick="finishPage()">确定</button>

</div>

<div id="page3" class="card black">

<h1>✅ 你的选择已提交给网页作者：钱钱</h1>

<p>

或者你可以微信联系作者

</p>

</div>

<div class="author">

网页作者：钱钱

</div>

<script>

function nextPage(){

document.getElementById("page1").style.display="none";

document.getElementById("page2").style.display="block";

}

function finishPage(){

let choose=document.querySelector('input[name="choose"]:checked');

if(!choose){

alert("请选择一个选项！");

return;

}

document.getElementById("page2").style.display="none";

document.getElementById("page3").style.display="block";

}

</script>

</body>

</html>
