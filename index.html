<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>今晚安排</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1b2735);background-size:400% 400%;animation:bg 12s infinite;color:#fff}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{width:920px;max-width:95%;padding:32px;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
h1{text-align:center;margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
.item{display:block;position:relative;border-radius:18px;overflow:hidden;border:3px solid transparent;cursor:pointer}
.item img{width:100%;height:240px;object-fit:cover;display:block;transition:.3s}
.item:hover img{transform:scale(1.05)}
.item input{position:absolute;top:12px;left:12px;transform:scale(1.5)}
.item:has(input:checked){border-color:#00ff9d;box-shadow:0 0 20px #00ff9d}
button{display:block;margin:30px auto 0;padding:14px 48px;border:none;border-radius:50px;background:#00d084;color:#fff;font-size:22px;cursor:pointer}
#page2{display:none;text-align:center}
.radio{margin:25px;font-size:28px}
.author{position:fixed;right:18px;bottom:15px;color:rgba(255,255,255,.7);font-size:14px}
</style>
</head>
<body>
<div id="page1" class="card">
<h1>🌙 请选择晚上的活动（可多选）</h1>
<div class="grid">
<label class="item"><input type="checkbox"><img src="1.jpg"></label>
<label class="item"><input type="checkbox"><img src="2.jpg"></label>
<label class="item"><input type="checkbox"><img src="3.jpg"></label>
<label class="item"><input type="checkbox"><img src="4.jpg"></label>
</div>
<button onclick="nextPage()">确认</button>
</div>

<div id="page2" class="card">
<h1>😂 不来是孙子</h1>
<div class="radio"><label><input type="radio" name="r"> 我是孙子</label></div>
<div class="radio"><label><input type="radio" name="r"> 我肯定来</label></div>
</div>

<div class="author">网页作者：钱钱</div>

<script>
function nextPage(){
document.getElementById('page1').style.display='none';
document.getElementById('page2').style.display='block';
}
</script>
</body>
</html>
