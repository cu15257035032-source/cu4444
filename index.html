<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邀请页面</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff5f7;
    overflow:hidden;
}

.page{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:38px;
    color:#ff4d6d;
    margin-bottom:40px;
}

button{
    padding:15px 40px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.agree{
    background:#ff4d6d;
    color:white;
}

.disagree{
    background:#cccccc;
}

#page2{
    display:none;
}

.flower{
    position:absolute;
    font-size:40px;
    animation:float 4s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(-200px) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- 第一页 -->
<div class="page" id="page1">
    <h1>王诗雨晚上一起吃饭吗</h1>

    <div>
        <button class="agree" onclick="goPage2()">同意</button>

        <button class="disagree">
            不同意
        </button>
    </div>
</div>

<!-- 第二页 -->
<div class="page" id="page2">
    <h1>❤️</h1>

    <button class="agree" onclick="showFlowers()">
        我同意
    </button>
</div>

<script>

function goPage2(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="flex";
}

function showFlowers(){

    for(let i=0;i<40;i++){

        let flower=document.createElement("div");

        flower.innerHTML="🌺";

        flower.className="flower";

        flower.style.left=Math.random()*100+"vw";

        flower.style.top=Math.random()*100+"vh";

        flower.style.fontSize=(30+Math.random()*30)+"px";

        document.body.appendChild(flower);

        setTimeout(()=>{
            flower.remove();
        },4000);
    }
}

</script>

</body>
</html>

</body>
