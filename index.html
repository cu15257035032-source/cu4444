<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>给王诗雨的小惊喜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:"Microsoft YaHei";
color:white;
height:100vh;
}

canvas{
position:fixed;
left:0;
top:0;
z-index:0;
}

.container{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
text-align:center;
padding:20px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

#startBtn{
background:#ff4d88;
color:white;
}

.message{
font-size:32px;
line-height:2;
max-width:900px;
}

.choice{
display:none;
margin-top:40px;
}

.green{
background:#4CAF50;
color:white;
margin-right:20px;
}

.red{
background:#ff4b4b;
color:white;
}

.heart{
position:fixed;
font-size:30px;
pointer-events:none;
animation:fly 5s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-800px) scale(2);
opacity:0;
}
}

#emoji{
font-size:100px;
margin-top:20px;
display:none;
}

.result{
font-size:40px;
margin-top:20px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div id="welcome">
<h1 style="margin-bottom:30px">
❤️ 王诗雨 ❤️
</h1>

<button id="startBtn">
点击这里有惊喜
</button>
</div>

<div id="story" style="display:none">

<div class="message" id="text"></div>

<div class="choice" id="choice">

<h2 style="margin-bottom:30px">
王诗雨，你愿意原谅我吗❤️
</h2>

<button class="green" onclick="forgive()">
💚 我原谅你
</button>

<button class="red" onclick="notForgive()">
❤️ 不原谅
</button>

<div id="emoji">😝</div>

<div class="result" id="result"></div>

</div>

</div>

</div>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);
}

drawStars();

function floatingHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(floatingHeart,500);

document.getElementById("startBtn").onclick=function(){

document.getElementById("welcome").style.display="none";
document.getElementById("story").style.display="block";

showTexts();

};

const texts=[

"诗雨，对不起，是我让你受委屈了。",

"我不该让你难过，更不该让你一个人生闷气。",

"你的每一次沉默，其实都让我特别心疼。",

"如果能重新来一次，我一定会把你哄得开开心心。"

];

let line=0;

function showTexts(){

if(line<texts.length){

let div=document.getElementById("text");

div.innerHTML=texts[line];

line++;

setTimeout(showTexts,2500);

}else{

document.getElementById("choice").style.display="block";

}

}

function heartExplosion(){

for(let i=0;i<120;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

},i*30);

}

}

function forgive(){

heartExplosion();

document.getElementById("result").innerHTML=
"谢谢宝宝❤️<br>我以后一定好好爱你";

}

function notForgive(){

document.getElementById("emoji").style.display="block";

document.getElementById("result").innerHTML=
"这个其实也是原谅按钮😝<br>你已经被爱心包围啦❤️";

heartExplosion();

}

</script>

</body>
</html>
