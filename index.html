<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认页面</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .box{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h1{
        margin-bottom:30px;
    }

    button{
        padding:12px 30px;
        margin:10px;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
    }

    .agree{
        background:#4CAF50;
        color:white;
    }

    .disagree{
        background:#f44336;
        color:white;
    }
</style>
</head>

<body>

<div class="box">
    <h1>请选择</h1>

    <button class="agree" onclick="agree()">同意</button>

    <button class="disagree" onclick="disagree()">不同意</button>
</div>

<script>
function agree(){
    alert("你选择了同意");
}

function disagree(){
    alert("你选择了不同意");
}
</script>

</body>
</html>
